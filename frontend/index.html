<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Planner AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --accent2: #7c5ef9;
      --text: #e8eaf0;
      --muted: #8b90a8;
      --success: #34d399;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      font-size: 28px;
    }

    .header-text h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Main layout */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      height: calc(100vh - 73px);
    }

    /* Sidebar / Form panel */
    .form-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-panel h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Budget row */
    .budget-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .budget-prefix {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 10px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 8px 0 0 8px;
    }

    .budget-row input {
      border-radius: 0 8px 8px 0;
    }

    /* Interests tags */
    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      min-height: 46px;
      cursor: text;
    }

    .tags-container:focus-within {
      border-color: var(--accent);
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(79, 142, 247, 0.15);
      border: 1px solid rgba(79, 142, 247, 0.35);
      color: var(--accent);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .tag button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 0;
      opacity: 0.7;
    }

    .tag button:hover { opacity: 1; }

    .tag-input {
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      flex: 1;
      min-width: 80px;
      padding: 3px 4px;
    }

    .tag-input:focus { outline: none; }

    .tag-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Mode selector */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .mode-toggle label {
      text-align: center;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.15s;
    }

    .mode-toggle input[type="radio"] { display: none; }

    .mode-toggle input:checked + label {
      background: var(--accent);
      color: white;
    }

    /* Buttons */
    .btn {
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Advanced section */
    details {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    summary {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 500;
      background: var(--surface2);
      user-select: none;
    }

    summary:hover { color: var(--text); }

    .details-content {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--surface);
    }

    /* Results panel */
    .result-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .result-header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .result-header h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .status-idle {
      background: rgba(139, 144, 168, 0.15);
      color: var(--muted);
    }

    .status-loading {
      background: rgba(79, 142, 247, 0.15);
      color: var(--accent);
      animation: pulse 1.5s infinite;
    }

    .status-done {
      background: rgba(52, 211, 153, 0.15);
      color: var(--success);
    }

    .status-error {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .result-body {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--muted);
      text-align: center;
    }

    .empty-state .icon {
      font-size: 56px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 0.85rem;
      max-width: 320px;
      line-height: 1.6;
    }

    /* Markdown output */
    .itinerary {
      max-width: 760px;
      line-height: 1.7;
    }

    .itinerary h1, .itinerary h2, .itinerary h3 {
      color: var(--text);
      margin-top: 1.5em;
      margin-bottom: 0.5em;
    }

    .itinerary h1 { font-size: 1.5rem; }
    .itinerary h2 {
      font-size: 1.15rem;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .itinerary h3 { font-size: 1rem; color: var(--accent); }

    .itinerary p { margin-bottom: 0.8em; color: var(--text); }

    .itinerary ul, .itinerary ol {
      padding-left: 1.4em;
      margin-bottom: 0.8em;
    }

    .itinerary li { margin-bottom: 0.3em; }

    .itinerary strong { color: var(--text); font-weight: 600; }

    .itinerary code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
      color: var(--accent2);
    }

    .itinerary blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--muted);
      margin: 1em 0;
    }

    .itinerary hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5em 0;
    }

    /* Cursor blink for streaming */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Error box */
    .error-box {
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      padding: 16px 20px;
      color: #f87171;
      font-size: 0.88rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        height: auto;
      }

      .result-panel {
        min-height: 60vh;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">✈️</div>
  <div class="header-text">
    <h1>Travel Planner AI</h1>
    <p>Powered by LangGraph &amp; Claude</p>
  </div>
</header>

<main>
  <!-- Form panel -->
  <div class="form-panel">
    <h2>Trip Details</h2>

    <div class="field">
      <label for="destination">Destination</label>
      <input type="text" id="destination" placeholder="e.g. Tokyo, Japan" />
    </div>

    <div class="field">
      <label for="budget">Budget (USD)</label>
      <div class="budget-row">
        <span class="budget-prefix">$</span>
        <input type="number" id="budget" placeholder="3000" min="0" />
      </div>
    </div>

    <div class="field">
      <label>Interests</label>
      <div class="tags-container" id="tags-container">
        <input
          class="tag-input"
          id="tag-input"
          placeholder="e.g. food, hiking…"
          autocomplete="off"
        />
      </div>
      <span class="tag-hint">Press Enter or comma to add an interest</span>
    </div>

    <div class="field">
      <label for="query">What would you like to know?</label>
      <textarea
        id="query"
        placeholder="e.g. Plan a detailed 7-day trip with must-see attractions, local restaurants, and transport tips."
      ></textarea>
    </div>

    <div class="field">
      <label>Response mode</label>
      <div class="mode-toggle">
        <input type="radio" name="mode" id="mode-stream" value="stream" checked />
        <label for="mode-stream">⚡ Stream</label>
        <input type="radio" name="mode" id="mode-full" value="full" />
        <label for="mode-full">📄 Full</label>
      </div>
    </div>

    <details>
      <summary>Advanced options</summary>
      <div class="details-content">
        <div class="field">
          <label for="user-id">User ID</label>
          <input type="text" id="user-id" placeholder="auto-generated" />
        </div>
        <div class="field">
          <label for="thread-id">Thread ID</label>
          <input type="text" id="thread-id" placeholder="auto-generated" />
        </div>
        <div class="field">
          <label for="api-url">API Base URL</label>
          <input type="text" id="api-url" value="http://localhost:8000" />
        </div>
      </div>
    </details>

    <button class="btn btn-primary" id="generate-btn" onclick="handleGenerate()">
      Generate Itinerary
    </button>

    <button class="btn btn-secondary" id="clear-btn" onclick="handleClear()">
      Clear
    </button>
  </div>

  <!-- Result panel -->
  <div class="result-panel">
    <div class="result-header">
      <h2>Itinerary</h2>
      <span class="status-badge status-idle" id="status-badge">Idle</span>
    </div>
    <div class="result-body" id="result-body">
      <div class="empty-state" id="empty-state">
        <div class="icon">🗺️</div>
        <h3>Your itinerary will appear here</h3>
        <p>Fill in your trip details on the left and click <strong>Generate Itinerary</strong> to get started.</p>
      </div>
    </div>
  </div>
</main>

<script>
  const API_BASE = () => document.getElementById('api-url').value.trim().replace(/\/$/, '');
  const tags = [];
  let abortController = null;

  // --- Tag input ---
  const tagInput = document.getElementById('tag-input');
  const tagsContainer = document.getElementById('tags-container');

  tagsContainer.addEventListener('click', () => tagInput.focus());

  tagInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      addTag(tagInput.value);
    } else if (e.key === 'Backspace' && tagInput.value === '' && tags.length > 0) {
      removeTag(tags.length - 1);
    }
  });

  tagInput.addEventListener('blur', () => {
    if (tagInput.value.trim()) addTag(tagInput.value);
  });

  function addTag(raw) {
    const value = raw.trim().replace(/,$/, '');
    if (!value || tags.includes(value)) { tagInput.value = ''; return; }
    tags.push(value);
    renderTags();
    tagInput.value = '';
  }

  function removeTag(index) {
    tags.splice(index, 1);
    renderTags();
  }

  function renderTags() {
    const existing = tagsContainer.querySelectorAll('.tag');
    existing.forEach(t => t.remove());
    tags.forEach((tag, i) => {
      const el = document.createElement('div');
      el.className = 'tag';
      el.innerHTML = `<span>${escapeHtml(tag)}</span><button onclick="removeTag(${i})" title="Remove">×</button>`;
      tagsContainer.insertBefore(el, tagInput);
    });
  }

  // --- ID helpers ---
  function uuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function getOrGenerate(id) {
    const el = document.getElementById(id);
    if (!el.value.trim()) el.value = uuid();
    return el.value.trim();
  }

  // --- Validation ---
  function validate() {
    const dest = document.getElementById('destination').value.trim();
    const budget = document.getElementById('budget').value.trim();
    const query = document.getElementById('query').value.trim();

    if (!dest) return 'Please enter a destination.';
    if (!budget || isNaN(parseInt(budget, 10))) return 'Please enter a valid budget.';
    if (!query) return 'Please describe what you\'d like to know.';
    if (tags.length === 0) return 'Please add at least one interest.';
    return null;
  }

  // --- UI helpers ---
  function setStatus(state, text) {
    const badge = document.getElementById('status-badge');
    badge.className = `status-badge status-${state}`;
    badge.textContent = text;
  }

  function setLoading(loading) {
    const btn = document.getElementById('generate-btn');
    btn.disabled = loading;
    btn.textContent = loading ? 'Generating…' : 'Generate Itinerary';
  }

  function showError(msg) {
    const body = document.getElementById('result-body');
    body.innerHTML = `<div class="error-box">⚠️ ${escapeHtml(msg)}</div>`;
    setStatus('error', 'Error');
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function buildRequest() {
    return {
      user_id: getOrGenerate('user-id'),
      thread_id: getOrGenerate('thread-id'),
      destination: document.getElementById('destination').value.trim(),
      budget: parseInt(document.getElementById('budget').value.trim(), 10),
      interests: [...tags],
      user_query: document.getElementById('query').value.trim(),
    };
  }

  // --- Main handler ---
  async function handleGenerate() {
    const error = validate();
    if (error) { showError(error); return; }

    const mode = document.querySelector('input[name="mode"]:checked').value;
    const body = buildRequest();

    setLoading(true);
    setStatus('loading', 'Generating…');

    const resultBody = document.getElementById('result-body');
    resultBody.innerHTML = '';

    const container = document.createElement('div');
    container.className = 'itinerary';
    resultBody.appendChild(container);

    if (abortController) abortController.abort();
    abortController = new AbortController();

    try {
      if (mode === 'stream') {
        await streamPlan(body, container);
      } else {
        await fullPlan(body, container);
      }
      setStatus('done', 'Done');
    } catch (err) {
      if (err.name !== 'AbortError') {
        showError(err.message || 'Something went wrong. Is the API running?');
      }
    } finally {
      setLoading(false);
    }
  }

  // --- Full response ---
  async function fullPlan(body, container) {
    const res = await fetch(`${API_BASE()}/travel/plan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: abortController.signal,
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(`API error ${res.status}: ${text}`);
    }

    const data = await res.json();
    container.innerHTML = marked.parse(data.itinerary || '');
  }

  // --- Streaming response ---
  async function streamPlan(body, container) {
    const res = await fetch(`${API_BASE()}/travel/plan/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: abortController.signal,
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(`API error ${res.status}: ${text}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let raw = '';

    // Add blinking cursor
    const cursor = document.createElement('span');
    cursor.className = 'cursor';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (line.startsWith('data:')) {
          const chunk = line.slice(5).trimStart();
          if (chunk === '[DONE]') break;
          raw += chunk;
          container.innerHTML = marked.parse(raw);
          container.appendChild(cursor);
          // Scroll to bottom
          const rb = document.getElementById('result-body');
          rb.scrollTop = rb.scrollHeight;
        }
      }
    }

    // Final render without cursor
    if (raw) container.innerHTML = marked.parse(raw);
  }

  // --- Clear ---
  function handleClear() {
    if (abortController) abortController.abort();

    document.getElementById('destination').value = '';
    document.getElementById('budget').value = '';
    document.getElementById('query').value = '';
    document.getElementById('user-id').value = '';
    document.getElementById('thread-id').value = '';
    tags.length = 0;
    renderTags();

    const resultBody = document.getElementById('result-body');
    resultBody.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="icon">🗺️</div>
        <h3>Your itinerary will appear here</h3>
        <p>Fill in your trip details on the left and click <strong>Generate Itinerary</strong> to get started.</p>
      </div>`;

    setStatus('idle', 'Idle');
    setLoading(false);
  }
</script>
</body>
</html>
